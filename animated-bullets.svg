<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="splitColor" x1="0" x2="1" y1="0" y2="0">
      <stop offset="50%" stop-color="#32CD32" />
      <stop offset="50%" stop-color="#90EE90" />
    </linearGradient>
    <g id="spinning-bullet">
      <circle cx="50" cy="20" r="18" fill="url(#splitColor)" stroke="#006400" stroke-width="7" />
      <circle cx="80" cy="50" r="18" fill="#90EE90" stroke="#006400" stroke-width="7" />
      <circle cx="50" cy="80" r="18" fill="url(#splitColor)" stroke="#006400" stroke-width="7" />
      <circle cx="20" cy="50" r="18" fill="#32CD32" stroke="#006400" stroke-width="7" />
    </g>
  </defs>
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #spinning-bullet { transform-origin: 50px 50px; animation: spin 1s linear infinite; }
  </style>
  <use href="#spinning-bullet" />
</svg>
