<svg width="400" height="150" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Define the animation */
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateX(-10px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* Apply styles to the text */
    .bullet {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      fill: #24292e; /* GitHub dark text color. Change to #c9d1d9 for dark mode */
      opacity: 0; /* Start hidden */
      animation: fadeIn 0.8s ease forwards;
    }

    /* Stagger the animations with delays */
    .item-1 { animation-delay: 0.5s; }
    .item-2 { animation-delay: 1.5s; }
    .item-3 { animation-delay: 2.5s; }
  </style>

  <text x="10" y="30" class="bullet item-1">• This is my first awesome point</text>
  <text x="10" y="70" class="bullet item-2">• Here comes the second point</text>
  <text x="10" y="110" class="bullet item-3">• And the final animated point</text>
</svg>
