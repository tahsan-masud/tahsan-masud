name: Generate Snake

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  # Allows you to run the action manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          # Your exact GitHub username
          github_user_name: tahsan-masud
          
          # Generates both a light and dark mode SVG
          # Generates both a light and dark mode SVG with a custom green snake
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%231AF509
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=yellow

      # Pushes the generated SVGs to an 'output' branch
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
